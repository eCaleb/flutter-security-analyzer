# Flutter Security Scanner - CI/CD Pipeline
#
# This workflow runs on every push and pull request to ensure:
# 1. All unit tests pass across Python 3.9, 3.10, 3.11, and 3.12
# 2. The scanner runs successfully against the sample vulnerable app
# 3. Scan results are uploaded as workflow artifacts
#
# Author: Caleb Elebhose
# Module: WB7103/WB7104 MSc Cybersecurity Project
# University of Chester

name: Flutter Security Scanner CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ===========================================================
  # Job 1: Run unit tests across multiple Python versions
  # ===========================================================
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Run unit tests with coverage
        if: matrix.python-version == '3.12'
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=html:coverage-report

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 14

  # ===========================================================
  # Job 2: Run the scanner against the sample vulnerable app
  # ===========================================================
  scan:
    name: Scanner Integration Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run scan on sample vulnerable app (Console)
        working-directory: src
        run: |
          python main.py ../samples/vulnerable_app.dart -f console -v || true

      - name: Run scan on sample vulnerable app (JSON)
        working-directory: src
        run: |
          python main.py ../samples/vulnerable_app.dart -f json -o ../scan-results.json -v || true

      - name: Run scan on sample vulnerable app (HTML)
        working-directory: src
        run: |
          python main.py ../samples/vulnerable_app.dart -f html -o ../scan-report.html -v || true

      - name: Display scan summary
        run: |
          echo "=== Scan Results Summary ==="
          if [ -f scan-results.json ]; then
            python -c "
          import json
          with open('scan-results.json') as f:
              data = json.load(f)
          findings = data.get('findings', [])
          print(f'Total findings: {len(findings)}')
          severities = {}
          for f_item in findings:
              s = f_item.get('severity', 'unknown')
              severities[s] = severities.get(s, 0) + 1
          for sev, count in sorted(severities.items()):
              print(f'  {sev}: {count}')
          categories = {}
          for f_item in findings:
              c = f_item.get('masvs_category', 'unknown')
              categories[c] = categories.get(c, 0) + 1
          for cat, count in sorted(categories.items()):
              print(f'  {cat}: {count}')
          "
          fi

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: |
            scan-results.json
            scan-report.html
          retention-days: 30

      - name: Check for critical findings
        run: |
          if [ -f scan-results.json ]; then
            CRITICAL=$(python -c "
          import json
          with open('scan-results.json') as f:
              data = json.load(f)
          critical = sum(1 for f in data.get('findings', []) if f.get('severity') == 'critical')
          print(critical)
          ")
            if [ "$CRITICAL" -gt 0 ]; then
              echo "::warning::Found $CRITICAL critical severity findings"
            fi
          fi
